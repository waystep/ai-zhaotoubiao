services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-smart_tender_review}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-smart_tender_review}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mineru:
    image: opendatalab/mineru:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MINERU_PORT:-8000}:8000"
    volumes:
      - mineru_models:/models

  migrate:
    build: .
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smart_tender_review}
    command: ["npm", "run", "db:push"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smart_tender_review}
      MINERU_API_URL: ${MINERU_API_URL:-http://mineru:8000}
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mineru:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smart_tender_review}
      MINERU_API_URL: ${MINERU_API_URL:-http://mineru:8000}
    command: ["npm", "run", "worker"]
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mineru:
        condition: service_started

volumes:
  postgres_data:
  mineru_models:
  uploads:
